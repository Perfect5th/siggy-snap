name: siggy
summary: A terminal-based Signal messenger client with an IRC aesthetic.
description: |
  A terminal-based Signal messenger client. Siggy is lightweight,
  persistent, private, extensible, and supports Vim keybindings.
base: core24
source-code: https://github.com/jonsideserf/siggy
license: GPL-3.0
contact: mitch@mitchellburton.ca
issues: https://github.com/johnsideserf/siggy/issues
donation: https://ko-fi.com/johnsideserf
website: https://siggy.chat
type: app
grade: devel
confinement: devmode
version: '1.6.0'

lint:
  ignore:
    - library: [usr/lib/jvm/**]

apps:
  siggy:
    command: bin/siggy

parts:
  siggy:
    plugin: rust
    rust-channel: stable
    source: https://github.com/johnsideserf/siggy
    source-type: git
    source-tag: v1.6.0
    stage: [bin/siggy]

  signal-cli:
    plugin: gradle
    gradle-task: installDist
    source: https://github.com/AsamK/signal-cli
    source-type: git
    source-tag: v0.14.2
    override-build: |
      craftctl default
      mkdir -p $CRAFT_PART_INSTALL/usr/sbin $CRAFT_PART_INSTALL/usr/lib
      cp build/install/signal-cli/bin/signal-cli $CRAFT_PART_INSTALL/usr/sbin/signal-cli
      cp build/install/signal-cli/lib/* $CRAFT_PART_INSTALL/usr/lib/
    build-packages: [openjdk-25-jdk-headless]
    stage:
      - usr/sbin/signal-cli
      - usr/lib

  runtime:
    plugin: jlink
    jlink-modules:
      - java.base
      - java.logging
      - java.management
      - java.naming
      - java.net.http
      - java.security.jgss
      - java.sql
      - jdk.crypto.ec
      - jdk.net
      - jdk.unsupported
    build-packages: [openjdk-25-jdk-headless]
    after: [signal-cli]

